<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play-to-Earn Snake Game</title>
    <meta name="description" content="A classic Snake Game with Web3 Play-to-Earn features.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Crypto Snake</h1>
            <div class="wallet-section">
                <button id="connectWalletBtn" class="btn primary-btn">Connect Wallet</button>
                <div id="walletInfo" class="hidden">
                    <span id="walletAddress"></span>
                </div>
            </div>
        </header>
        
        <main>
            <div class="game-info">
                <div class="score-board">
                    Score: <span id="score">0</span>
                </div>
                <div class="token-balance">
                    Tokens: <span id="tokens">0</span> 💰
                </div>
            </div>

            <div class="game-board-container">
                <div id="rewardMessage" class="reward-message hidden">You earned tokens!</div>
                <div id="gameOverMessage" class="game-over-message hidden">
                    <h2>Game Over!</h2>
                    <p>Score: <span id="finalScore">0</span></p>
                    <button id="restartBtn" class="btn restart-btn">Play Again</button>
                </div>
                <canvas id="gameCanvas" width="400" height="400"></canvas>
            </div>

            <div class="controls-section">
                <button id="startBtn" class="btn start-btn">Start Game</button>
                <div class="speed-control">
                    <label for="speedSlider">Speed: <span id="speedValue">10</span></label>
                    <input type="range" id="speedSlider" min="5" max="30" value="10" step="1">
                </div>
            </div>
        </main>
    </div>

    <!-- Ethers.js for Web3 (Optional based on implementation details, but window.ethereum is easier) -->
    <script src="game.js"></script>
</body>
</html>
